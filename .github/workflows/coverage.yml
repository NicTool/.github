name: Test Coverage

on:
  workflow_call:

env:
  CI: true
  NODE_ENV: cov

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@v4
      - uses: actions/checkout@v4
      - run: npm install
      - run: npm run test:coverage
      - uses: codecov/codecov-action@v2
      - uses: coverallsapp/github-action@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
